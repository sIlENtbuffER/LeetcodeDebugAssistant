<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LeetCode Debug Assistant</title>
  <link rel="stylesheet" href="popup.css">
  <script src="../theme.js"></script>
  <script src="marked.min.js"></script>
  <!-- KaTeX for LaTeX math rendering -->
  <link rel="stylesheet" href="katex/katex.min.css">
  <script src="katex.min.js"></script>
  <script src="auto-render.min.js"></script>
  <style>
    /* Additional styles for markdown rendering */
    #answer {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
      max-height: 560px;
      overflow-y: auto;
    }
    #answer h1, #answer h2, #answer h3 {
      margin: 0.5em 0;
      font-weight: 600;
    }
    #answer h2 { font-size: 1.1em; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
    #answer h3 { font-size: 1em; }
    #answer ul, #answer ol { margin: 0.5em 0; padding-left: 1.5em; }
    #answer li { margin: 0.25em 0; }
    #answer code {
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 0.9em;
    }
    #answer pre {
      background: #1f2937;
      color: #e5e7eb;
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 8px 0;
    }
    #answer pre code {
      background: transparent;
      padding: 0;
      color: inherit;
    }
    #answer strong { font-weight: 600; }
    #answer em { font-style: italic; }
    #answer p { margin: 0.5em 0; }
    #answer blockquote {
      border-left: 3px solid #6366f1;
      padding-left: 12px;
      color: #6b7280;
      margin: 8px 0;
    }
    /* KaTeX math styles */
    .katex {
      font-size: 1.05em;
    }
    .katex-display {
      margin: 12px 0;
      overflow-x: auto;
      overflow-y: hidden;
    }
    .button-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .button-row button {
      flex: 1;
    }
    /* Mode selector segmented control */
    .mode-selector {
      display: flex;
      background: #f3f4f6;
      border-radius: 6px;
      padding: 2px;
      margin-bottom: 8px;
    }
    .mode-option {
      flex: 1;
      text-align: center;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.15s;
      color: #6b7280;
    }
    .mode-option:hover {
      background: rgba(255,255,255,0.5);
    }
    .mode-option.active {
      background: white;
      color: #4f46e5;
      font-weight: 600;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    /* Hint mode collapsible sections */
    .hint-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .hint-section {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .hint-section.expanded {
      background: #f9fafb;
    }
    .hint-section.collapsed {
      display: none;
    }
    .hint-section.hint-solution {
      border-color: #6366f1;
      border-width: 2px;
    }
    .hint-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      user-select: none;
    }
    .hint-title {
      font-weight: 600;
      font-size: 0.9em;
      color: #374151;
    }
    .hint-section.hint-solution .hint-title {
      color: #4f46e5;
    }
    .hint-next-btn {
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .hint-next-btn:hover {
      background: #4338ca;
    }
    .hint-content {
      padding: 0 14px 14px;
    }
    .hint-content h3 {
      margin-top: 8px;
    }
    /* Step dots indicator */
    .hint-progress {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 0;
      margin-top: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #f9fafb;
    }
    .hint-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #d1d5db;
      transition: background 0.2s;
    }
    .hint-dot.revealed {
      background: #4f46e5;
    }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    /* Dark mode overrides */
    :root.dark #answer code {
      background: #374151;
    }
    :root.dark #answer h2 { border-bottom-color: #4b5563; }
    :root.dark #answer blockquote { color: #9ca3af; }
    :root.dark .mode-selector {
      background: #374151;
    }
    :root.dark .mode-option {
      color: #9ca3af;
    }
    :root.dark .mode-option:hover {
      background: rgba(255,255,255,0.08);
    }
    :root.dark .mode-option.active {
      background: #4b5563;
      color: #a5b4fc;
      box-shadow: none;
    }
    :root.dark .hint-section {
      border-color: #4b5563;
    }
    :root.dark .hint-section.expanded {
      background: #1f2937;
    }
    :root.dark .hint-progress {
      border-color: #4b5563;
      background: #1f2937;
    }
    :root.dark .hint-dot {
      background: #4b5563;
    }
    :root.dark .hint-dot.revealed {
      background: #6366f1;
    }
    :root.dark .hint-title {
      color: #d1d5db;
    }
    :root.dark .hint-section.hint-solution .hint-title {
      color: #a5b4fc;
    }
    :root.dark #loading { color: #9ca3af; }
    :root.dark ::-webkit-scrollbar-thumb { background: #4b5563; }
    :root.dark ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
  </style>
</head>
<body>
  <div class="flex items-center justify-between gap-2 mb-2">
    <h2 class="m-0 text-sm">Debug Assistant</h2>
    <span id="providerBadge" class="text-[10px] bg-gray-100 dark:bg-gray-700 px-1.5 py-0.5 rounded text-gray-600 dark:text-gray-300">OpenAI</span>
  </div>
  <!-- Mode selector -->
  <div class="mode-selector" id="modeSelector">
    <div class="mode-option" data-mode="debug">Debug</div>
    <div class="mode-option active" data-mode="hint">Hint</div>
    <div class="mode-option" data-mode="interview">Interview</div>
  </div>
  <button id="analyzeBtn" type="button"
  class="rounded-sm bg-indigo-600 px-3 py-1 text-xs font-bold text-white shadow-sm hover:bg-indigo-700 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">
 Debug</button>
  <button id="clearBtn" type="button"
  class="rounded-sm bg-red-500 px-3 py-1 text-xs font-bold text-white shadow-sm hover:bg-red-600 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-red-600">
 Clear</button>
  <div id="loading" style="display:none">Loading...</div>
  <div id="answer"></div>
  <div class="button-row" id="buttonRow" style="display:none">
    <button id="copyBtn" class="rounded-sm bg-green-600 px-3 py-1 text-xs font-bold text-white shadow-sm hover:bg-green-700">Copy</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
