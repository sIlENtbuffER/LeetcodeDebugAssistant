<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LeetCode Debug Assistant</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="flex items-center justify-between gap-2 mb-2">
    <h2 class="m-0 text-sm">Debug Assistant</h2>
    <span id="providerBadge" class="text-[10px] bg-gray-100 dark:bg-gray-700 px-1.5 py-0.5 rounded text-gray-600 dark:text-gray-300">OpenAI</span>
  </div>
  <button id="analyzeBtn"type="button"
  class="rounded-sm bg-indigo-600 px-2 py-1 text-xs font-semibold text-white shadow-xs hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 dark:bg-indigo-500 dark:shadow-none dark:hover:bg-indigo-400 dark:focus-visible:outline-indigo-500">
 Debug</button>
  <div id="loading" style="display:none">Loading...</div>
  <pre id="answer"></pre>
  <button id="copyBtn" style="display:none">Copy</button>
  <script src="popup.js"></script>
</body>
</html>
